<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>知识气泡</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#05050e;color:#e2e8f0}

    /* ── Starfield ── */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:
        radial-gradient(1px 1px at 8%  18%,rgba(255,255,255,.55) 0%,transparent 100%),
        radial-gradient(1px 1px at 88% 12%,rgba(255,255,255,.45) 0%,transparent 100%),
        radial-gradient(1px 1px at 63% 82%,rgba(255,255,255,.4)  0%,transparent 100%),
        radial-gradient(1px 1px at 38% 58%,rgba(255,255,255,.35) 0%,transparent 100%),
        radial-gradient(1px 1px at 92% 55%,rgba(255,255,255,.5)  0%,transparent 100%),
        radial-gradient(1px 1px at 12% 72%,rgba(255,255,255,.3)  0%,transparent 100%),
        radial-gradient(1px 1px at 74% 38%,rgba(255,255,255,.45) 0%,transparent 100%),
        radial-gradient(1px 1px at 28% 92%,rgba(255,255,255,.28) 0%,transparent 100%),
        radial-gradient(1px 1px at 52% 8%, rgba(255,255,255,.42) 0%,transparent 100%),
        radial-gradient(1px 1px at 4%  48%,rgba(255,255,255,.32) 0%,transparent 100%),
        radial-gradient(1px 1px at 46% 33%,rgba(255,255,255,.25) 0%,transparent 100%),
        radial-gradient(1px 1px at 81% 78%,rgba(255,255,255,.38) 0%,transparent 100%),
        radial-gradient(circle at 18% 42%,rgba(56,189,248,.035) 0%,transparent 52%),
        radial-gradient(circle at 82% 62%,rgba(168,85,247,.035) 0%,transparent 52%);
      pointer-events:none;z-index:0;
    }

    /* ── Topbar ── */
    #topbar{
      position:fixed;top:0;left:0;right:0;height:52px;
      background:rgba(5,5,14,.92);backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.055);
      display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100;
    }
    .logo{
      font-size:15px;font-weight:800;letter-spacing:-.2px;
      background:linear-gradient(135deg,#38bdf8,#a855f7);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      white-space:nowrap;flex-shrink:0;
    }
    #breadcrumb{flex:1;display:flex;align-items:center;gap:2px;overflow:hidden;font-size:12px;min-width:0}
    .crumb{color:rgba(255,255,255,.35);cursor:pointer;padding:3px 7px;border-radius:6px;white-space:nowrap;transition:all .15s;flex-shrink:0}
    .crumb:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.06)}
    .crumb.active{color:white;cursor:default;flex-shrink:1;overflow:hidden;text-overflow:ellipsis}
    .crumb-sep{color:rgba(255,255,255,.16);flex-shrink:0;padding:0 1px}
    #search-input{
      width:150px;flex-shrink:0;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      border-radius:20px;padding:7px 13px;color:#e2e8f0;font-size:13px;outline:none;
      transition:border-color .2s,width .2s;
    }
    #search-input:focus{border-color:rgba(168,85,247,.4);width:190px}
    #search-input::placeholder{color:rgba(255,255,255,.18)}
    #settings-btn{
      width:32px;height:32px;flex-shrink:0;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,.38);font-size:14px;transition:all .2s;
    }
    #settings-btn:hover{color:white;border-color:rgba(255,255,255,.2)}

    /* ── Arena ── */
    #arena{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1}

    /* ── Bubbles ── */
    .bubble{position:absolute;transform:translate(-50%,-50%);cursor:pointer}

    .bubble-body{
      position:relative;border-radius:50%;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:14px;
      /* Glass: dark interior + specular highlight */
      background:
        radial-gradient(ellipse 46% 28% at 36% 24%, rgba(255,255,255,.44) 0%, rgba(255,255,255,.1) 50%, transparent 100%),
        radial-gradient(circle at 50% 50%, rgba(8,8,28,.62) 0%, rgba(5,5,18,.88) 100%);
      border:1.5px solid rgba(255,255,255,.15);
      transition:transform .22s cubic-bezier(.34,1.56,.64,1);
    }

    /* Domain colour rim */
    .bubble-body::before{
      content:'';position:absolute;inset:0;border-radius:50%;
      transition:opacity .3s;
    }
    .bubble.cv  .bubble-body::before{background:radial-gradient(circle at 50% 50%,transparent 38%,rgba(56,189,248,.22) 100%)}
    .bubble.llm .bubble-body::before{background:radial-gradient(circle at 50% 50%,transparent 38%,rgba(168,85,247,.22) 100%)}
    .bubble.gen .bubble-body::before{background:radial-gradient(circle at 50% 50%,transparent 38%,rgba(249,115,22,.22) 100%)}

    /* Bottom rim light */
    .bubble-body::after{
      content:'';position:absolute;
      bottom:12%;left:50%;transform:translateX(-50%);
      width:36%;height:7%;border-radius:50%;
      background:rgba(255,255,255,.1);filter:blur(3px);
    }

    /* Pulsing glow per domain */
    @keyframes glow-cv {
      0%,100%{box-shadow:0 0 26px rgba(56,189,248,.3), 0 10px 30px rgba(0,0,0,.55),inset 0 1.5px 0 rgba(255,255,255,.22)}
      50%    {box-shadow:0 0 44px rgba(56,189,248,.52),0 10px 30px rgba(0,0,0,.55),inset 0 1.5px 0 rgba(255,255,255,.22)}
    }
    @keyframes glow-llm{
      0%,100%{box-shadow:0 0 26px rgba(168,85,247,.3), 0 10px 30px rgba(0,0,0,.55),inset 0 1.5px 0 rgba(255,255,255,.22)}
      50%    {box-shadow:0 0 44px rgba(168,85,247,.52),0 10px 30px rgba(0,0,0,.55),inset 0 1.5px 0 rgba(255,255,255,.22)}
    }
    @keyframes glow-gen{
      0%,100%{box-shadow:0 0 26px rgba(249,115,22,.3), 0 10px 30px rgba(0,0,0,.55),inset 0 1.5px 0 rgba(255,255,255,.22)}
      50%    {box-shadow:0 0 44px rgba(249,115,22,.52), 0 10px 30px rgba(0,0,0,.55),inset 0 1.5px 0 rgba(255,255,255,.22)}
    }
    .bubble.cv  .bubble-body{animation:glow-cv  3.2s ease-in-out infinite}
    .bubble.llm .bubble-body{animation:glow-llm 3.2s ease-in-out infinite}
    .bubble.gen .bubble-body{animation:glow-gen 3.2s ease-in-out infinite}

    .bubble:hover   .bubble-body{transform:scale(1.09)}
    .bubble.selected .bubble-body{transform:scale(1.12)}
    .bubble.selected.cv  .bubble-body{animation:none;box-shadow:0 0 52px rgba(56,189,248,.7), 0 12px 32px rgba(0,0,0,.6),inset 0 1.5px 0 rgba(255,255,255,.3)}
    .bubble.selected.llm .bubble-body{animation:none;box-shadow:0 0 52px rgba(168,85,247,.7),0 12px 32px rgba(0,0,0,.6),inset 0 1.5px 0 rgba(255,255,255,.3)}
    .bubble.selected.gen .bubble-body{animation:none;box-shadow:0 0 52px rgba(249,115,22,.7), 0 12px 32px rgba(0,0,0,.6),inset 0 1.5px 0 rgba(255,255,255,.3)}

    .bubble-label{position:relative;z-index:1;font-size:13px;font-weight:700;color:rgba(255,255,255,.92);line-height:1.3;pointer-events:none}
    .bubble-dot{position:relative;z-index:1;width:5px;height:5px;border-radius:50%;margin-top:7px;background:rgba(255,255,255,.18);transition:background .3s}
    .bubble.visited .bubble-dot{background:rgba(134,239,172,.8);box-shadow:0 0 6px rgba(134,239,172,.5)}
    .bubble-arrow{position:relative;z-index:1;font-size:9px;color:rgba(255,255,255,.28);margin-top:3px;transition:color .2s;pointer-events:none;letter-spacing:-1px}
    .bubble:hover .bubble-arrow{color:rgba(255,255,255,.6)}

    /* Float & pop animations */
    @keyframes f0{0%,100%{margin-top:0}50%{margin-top:-12px}}
    @keyframes f1{0%,100%{margin-top:-4px}50%{margin-top:10px}}
    @keyframes f2{0%,100%{margin-top:8px}50%{margin-top:-10px}}
    @keyframes f3{0%,100%{margin-top:-3px}50%{margin-top:13px}}
    @keyframes f4{0%,100%{margin-top:9px}50%{margin-top:-8px}}
    @keyframes f5{0%,100%{margin-top:-7px}50%{margin-top:9px}}
    @keyframes popIn{
      from{opacity:0;transform:translate(-50%,-50%) scale(0.2)}
      to  {opacity:1;transform:translate(-50%,-50%) scale(1)}
    }

    /* Empty state */
    .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.4}
    .empty-icon{font-size:52px}
    .empty-text{font-size:14px;color:rgba(255,255,255,.5);text-align:center;max-width:220px;line-height:1.65}

    /* ── Back button ── */
    #back-btn{
      position:fixed;bottom:28px;left:50%;
      transform:translateX(-50%) translateY(90px);
      background:rgba(8,8,24,.92);backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.1);border-radius:26px;
      color:rgba(255,255,255,.65);padding:10px 22px;font-size:13px;font-weight:600;
      cursor:pointer;z-index:60;display:flex;align-items:center;gap:8px;
      transition:transform .35s cubic-bezier(.34,1.2,.64,1),color .2s,border-color .2s;
      white-space:nowrap;
    }
    #back-btn.visible{transform:translateX(-50%) translateY(0)}
    #back-btn:hover{color:white;border-color:rgba(255,255,255,.22)}

    /* ── Side Panel ── */
    #panel{
      position:fixed;top:52px;right:0;bottom:0;width:390px;
      background:rgba(6,6,20,.97);backdrop-filter:blur(22px);
      border-left:1px solid rgba(255,255,255,.055);
      transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
      z-index:50;display:flex;flex-direction:column;overflow:hidden;
    }
    #panel.open{transform:translateX(0)}

    #panel-header{padding:18px 16px 0;position:relative;flex-shrink:0}
    #panel-close{
      position:absolute;top:14px;right:12px;width:28px;height:28px;
      background:rgba(255,255,255,.06);border:none;border-radius:50%;cursor:pointer;
      color:rgba(255,255,255,.38);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;
    }
    #panel-close:hover{color:white;background:rgba(255,255,255,.12)}
    #panel-title{font-size:21px;font-weight:800;margin-bottom:4px;padding-right:36px;line-height:1.2}
    #panel-intuition{font-size:13px;color:rgba(255,255,255,.36);margin-bottom:12px;line-height:1.55}

    #explore-btn{
      margin:0 16px 14px;flex-shrink:0;
      background:linear-gradient(135deg,rgba(56,189,248,.09),rgba(168,85,247,.11));
      border:1px solid rgba(168,85,247,.25);color:#c084fc;
      padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:space-between;transition:all .2s;
    }
    #explore-btn:hover{background:linear-gradient(135deg,rgba(56,189,248,.18),rgba(168,85,247,.22));color:white;border-color:rgba(168,85,247,.48)}
    #explore-btn:disabled{opacity:.45;cursor:not-allowed}

    .tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.055);padding:0 16px;flex-shrink:0;gap:2px}
    .tab{padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.28);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
    .tab:hover{color:rgba(255,255,255,.6)}
    .tab.active{color:white;border-bottom-color:#a855f7}

    #panel-body{flex:1;overflow-y:auto;padding:16px}
    #panel-body::-webkit-scrollbar{width:3px}
    #panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
    .tab-pane{display:none}
    .tab-pane.active{display:block}

    .md p{font-size:13px;line-height:1.78;color:rgba(255,255,255,.68);margin-bottom:10px}
    .md ul,.md ol{font-size:13px;line-height:1.72;color:rgba(255,255,255,.68);padding-left:18px;margin-bottom:10px}
    .md li{margin-bottom:3px}
    .md strong{color:rgba(255,255,255,.9)}
    .md h1,.md h2,.md h3{color:white;font-size:14px;margin:14px 0 6px}
    .md code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px;color:#93c5fd;font-family:'JetBrains Mono',monospace}
    .md pre{background:#0d1117;border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;border:1px solid rgba(255,255,255,.05)}
    .md pre code{background:transparent;padding:0;font-size:12px;line-height:1.65;color:inherit}
    .md blockquote{border-left:3px solid #a855f7;padding-left:12px;color:rgba(255,255,255,.44);font-style:italic;margin:10px 0}
    .md a{color:#38bdf8;text-decoration:none}
    .md a:hover{text-decoration:underline}

    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:14px}
    .spinner{width:34px;height:34px;border:3px solid rgba(168,85,247,.14);border-top-color:#a855f7;border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p{color:rgba(255,255,255,.28);font-size:13px}

    .paper-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:13px;margin-bottom:10px}
    .paper-title{font-size:13px;font-weight:700;color:#c084fc;margin-bottom:3px}
    .paper-meta{font-size:12px;color:rgba(255,255,255,.28);margin-bottom:8px}
    .paper-link{font-size:12px;color:#38bdf8;text-decoration:none}
    .paper-link:hover{text-decoration:underline}

    .sec{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.18);margin-bottom:10px}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{background:rgba(168,85,247,.09);border:1px solid rgba(168,85,247,.18);color:#c084fc;padding:5px 11px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .18s}
    .chip:hover{background:rgba(168,85,247,.22);border-color:rgba(168,85,247,.44);color:white}

    /* Settings */
    #settings-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
    #settings-modal.open{display:flex}
    .modal-box{background:#09091e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;width:350px;max-width:calc(100vw - 32px)}
    .modal-title{font-size:17px;font-weight:800;margin-bottom:18px}
    .form-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.32);margin-bottom:5px;display:block;letter-spacing:.06em;text-transform:uppercase}
    .form-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 12px;color:white;font-size:13px;outline:none;margin-bottom:14px;font-family:monospace;transition:border-color .2s}
    .form-input:focus{border-color:rgba(168,85,247,.48)}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}
    .btn-p{background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;color:white;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
    .btn-s{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px}

    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(12,12,32,.96);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 18px;font-size:13px;color:rgba(255,255,255,.8);z-index:300;transition:transform .3s;pointer-events:none;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0)}

    @media(max-width:600px){
      #panel{width:100%;border-left:none;border-top:1px solid rgba(255,255,255,.055)}
      #search-input{width:100px}
      #search-input:focus{width:130px}
    }
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo">知识气泡</div>
  <nav id="breadcrumb"></nav>
  <input id="search-input" type="text" placeholder="Enter 添加概念…">
  <button id="settings-btn" title="设置">⚙</button>
</div>

<div id="arena"></div>

<!-- Back button -->
<button id="back-btn">← 返回上一层</button>

<div id="panel">
  <div id="panel-header">
    <button id="panel-close">✕</button>
    <div id="panel-title"></div>
    <div id="panel-intuition"></div>
  </div>
  <button id="explore-btn">深入探索，展开子话题 <span>→</span></button>
  <div class="tabs">
    <div class="tab active" data-tab="concept">💡 概念</div>
    <div class="tab" data-tab="mechanism">⚙️ 原理</div>
    <div class="tab" data-tab="code">💻 代码</div>
    <div class="tab" data-tab="papers">📄 论文</div>
  </div>
  <div id="panel-body">
    <div class="tab-pane active" id="tab-concept"></div>
    <div class="tab-pane" id="tab-mechanism"></div>
    <div class="tab-pane" id="tab-code"></div>
    <div class="tab-pane" id="tab-papers"></div>
  </div>
</div>

<div id="settings-modal">
  <div class="modal-box">
    <div class="modal-title">⚙️ 设置</div>
    <label class="form-label">DeepSeek API Key</label>
    <input class="form-input" id="api-key-input" type="password" placeholder="sk-…">
    <label class="form-label">每个气泡展开的子话题数量</label>
    <input class="form-input" id="sub-count" type="number" value="5" min="3" max="8">
    <div class="modal-actions">
      <button class="btn-s" id="modal-cancel">取消</button>
      <button class="btn-p" id="modal-save">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
'use strict';

// ─── Seeds ───────────────────────────────────────────────────────────────────
const SEEDS = [
  {id:'cv',           label:'计算机视觉',  domain:'cv',  level:0, parentId:null},
  {id:'llm',          label:'大语言模型',  domain:'llm', level:0, parentId:null},
  {id:'detection',    label:'目标检测',    domain:'cv',  level:1, parentId:'cv'},
  {id:'segmentation', label:'图像分割',    domain:'cv',  level:1, parentId:'cv'},
  {id:'vit',          label:'ViT',         domain:'cv',  level:1, parentId:'cv'},
  {id:'multimodal',   label:'多模态',      domain:'cv',  level:1, parentId:'cv'},
  {id:'imggen',       label:'图像生成',    domain:'cv',  level:1, parentId:'cv'},
  {id:'transformer',  label:'Transformer', domain:'llm', level:1, parentId:'llm'},
  {id:'pretraining',  label:'预训练',      domain:'llm', level:1, parentId:'llm'},
  {id:'rlhf',         label:'RLHF',        domain:'llm', level:1, parentId:'llm'},
  {id:'agent',        label:'Agent',       domain:'llm', level:1, parentId:'llm'},
  {id:'rag',          label:'RAG',         domain:'llm', level:1, parentId:'llm'},
];

// ─── Settings ────────────────────────────────────────────────────────────────
const S = {
  get key()    { return localStorage.getItem('ds_key') || ''; },
  set key(v)   { localStorage.setItem('ds_key', v); },
  get count()  { return +(localStorage.getItem('sub_n') || 5); },
  set count(v) { localStorage.setItem('sub_n', v); },
};

// ─── DB ──────────────────────────────────────────────────────────────────────
const DB = (() => {
  let _db;
  const open = () => new Promise((ok,fail) => {
    const r = indexedDB.open('KB4', 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('nodes')) d.createObjectStore('nodes',{keyPath:'id'});
    };
    r.onsuccess = e => { _db = e.target.result; ok(); };
    r.onerror = fail;
  });
  const st = m => _db.transaction('nodes',m).objectStore('nodes');
  const all = () => new Promise((ok,fail) => { const r=st('readonly').getAll(); r.onsuccess=()=>ok(r.result); r.onerror=fail; });
  const put = item => new Promise((ok,fail) => { const r=st('readwrite').put(item); r.onsuccess=ok; r.onerror=fail; });
  return {open,all,put};
})();

// ─── API ─────────────────────────────────────────────────────────────────────
async function fetchContent(label, domain) {
  const ctx = domain==='cv'?'计算机视觉':domain==='llm'?'大语言模型':'人工智能';
  const prompt =
`你是${ctx}领域技术知识助手。为"${label}"生成学习卡片。
返回合法 JSON，字段值中换行用 \\n，不要输出 JSON 以外的任何内容：
{
  "intuition": "核心直觉，20字以内",
  "problem": "解决了什么问题，Markdown格式，100字左右",
  "mechanism": "工作原理，Markdown格式含公式（用反引号），200字左右",
  "code": "最小Python示例，约12行有注释，每行间用 \\\\n 分隔，不加代码围栏",
  "papers": [{"title":"论文名","authors":"作者 et al.","year":2017,"url":"https://arxiv.org/abs/xxxx.xxxxx"}],
  "subtopics": ["具体子概念1","具体子概念2","具体子概念3","具体子概念4","具体子概念5"]
}`;

  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method:'POST',
    headers:{'Authorization':`Bearer ${S.key}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],temperature:0.7,max_tokens:3000}),
  });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  let raw = (await resp.json()).choices[0].message.content.trim();
  if (raw.startsWith('```')) raw = raw.replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'');
  const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
  if (s >= 0 && e > s) raw = raw.slice(s, e+1);
  return JSON.parse(raw);
}

// ─── State ───────────────────────────────────────────────────────────────────
let nodes = [];
let currentNodeId = null;
let breadcrumb = [];
let activeBubbleId = null;

const getNode = id => nodes.find(n => n.id === id);
const getChildren = pid => nodes.filter(n => n.parentId === pid);

// ─── Layouts ─────────────────────────────────────────────────────────────────
const LAYOUTS = [
  [],
  [[50,50]],
  [[30,50],[70,50]],
  [[50,27],[24,65],[76,65]],
  [[28,30],[72,30],[22,68],[78,68]],
  [[50,20],[80,42],[70,76],[30,76],[20,42]],
  [[50,17],[78,30],[86,58],[66,82],[34,82],[14,58],[22,30]],
  [[50,14],[74,24],[89,48],[80,74],[57,88],[33,88],[11,74],[26,24]],
  [[50,13],[72,20],[89,38],[90,60],[74,80],[52,89],[30,80],[11,60],[11,38]],
];
function getLayout(n) {
  if (n <= 0) return [];
  if (n < LAYOUTS.length) return LAYOUTS[n];
  return Array.from({length:n},(_,i)=>{
    const c=4, row=Math.floor(i/c), col=i%c, rows=Math.ceil(n/c);
    return [14+col*24, 22+row*(54/Math.max(rows-1,1))];
  });
}

// ─── Render bubbles ───────────────────────────────────────────────────────────
const FLOATS = ['f0','f1','f2','f3','f4','f5'];

function renderBubbles() {
  const arena = document.getElementById('arena');
  const children = getChildren(currentNodeId);
  const backBtn = document.getElementById('back-btn');
  backBtn.classList.toggle('visible', currentNodeId !== null);

  if (children.length === 0) {
    arena.innerHTML = `<div class="empty">
      <div class="empty-icon">🌱</div>
      <div class="empty-text">点击气泡打开面板，<br>再点「深入探索」进入下一层</div>
    </div>`;
    return;
  }

  arena.innerHTML = '';
  const positions = getLayout(children.length);
  const vw = window.innerWidth, vh = window.innerHeight - 52;

  children.forEach((node, i) => {
    const [cx, cy] = positions[i] || [50,50];
    const maxSz = Math.min(vw, vh) * 0.27;
    const sz = Math.min(node.level===0?160:node.level===1?122:98, maxSz);
    const kf = FLOATS[i % FLOATS.length];
    const dur = 4.5 + (i%4)*0.65;
    const del = (i*0.48)%2.8;
    const popDel = i*0.06;
    const hasKids = node.childrenGenerated || getChildren(node.id).length > 0;

    const div = document.createElement('div');
    div.className = `bubble ${node.domain}${node.visited?' visited':''}${activeBubbleId===node.id?' selected':''}`;
    div.dataset.id = node.id;
    div.style.cssText = `left:${cx}%;top:${cy}%;
      animation:popIn .48s cubic-bezier(.175,.885,.32,1.275) ${popDel}s backwards,
                ${kf} ${dur}s ease-in-out ${del}s infinite;`;

    div.innerHTML = `<div class="bubble-body" style="width:${sz}px;height:${sz}px">
      <div class="bubble-label">${node.label}</div>
      <div class="bubble-dot"></div>
      ${hasKids?'<div class="bubble-arrow">▾ ▾</div>':''}
    </div>`;

    div.addEventListener('click', () => onBubbleClick(node));
    arena.appendChild(div);
  });
}

function renderBreadcrumb() {
  const nav = document.getElementById('breadcrumb');
  const crumbs = [{id:null, label:'首页'}, ...breadcrumb];
  nav.innerHTML = crumbs.map((c,i) => {
    const last = i===crumbs.length-1;
    return (i>0?'<span class="crumb-sep">›</span>':'')+
      `<span class="crumb${last?' active':''}" data-idx="${i}">${c.label}</span>`;
  }).join('');
  nav.querySelectorAll('.crumb:not(.active)').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      breadcrumb = idx===0 ? [] : breadcrumb.slice(0, idx);
      currentNodeId = idx===0 ? null : breadcrumb[breadcrumb.length-1].id;
      activeBubbleId = null;
      closePanel();
      renderBreadcrumb();
      renderBubbles();
    });
  });
}

function navigateBack() {
  if (currentNodeId === null) return;
  breadcrumb.pop();
  currentNodeId = breadcrumb.length > 0 ? breadcrumb[breadcrumb.length-1].id : null;
  activeBubbleId = null;
  closePanel();
  renderBreadcrumb();
  renderBubbles();
}

// ─── Panel ───────────────────────────────────────────────────────────────────
function openPanel(node) {
  activeBubbleId = node.id;
  renderBubbles();
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-title').textContent = node.label;
  document.getElementById('panel-intuition').textContent = node.content?.intuition || '生成中…';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab==='concept'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id==='tab-concept'));
  if (node.content) renderPanelContent(node.content, node);
  else { setLoading(); loadContent(node); }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  activeBubbleId = null;
  renderBubbles();
}

function setLoading() {
  const h = `<div class="loading"><div class="spinner"></div><p>AI 生成中…</p></div>`;
  ['concept','mechanism','code','papers'].forEach(t => {
    document.getElementById('tab-'+t).innerHTML = h;
  });
}

async function loadContent(node) {
  if (!S.key) {
    document.getElementById('tab-concept').innerHTML =
      `<div style="padding:12px;color:rgba(255,255,255,.4);font-size:13px;line-height:1.7">请先点右上角 ⚙ 填入 DeepSeek API Key</div>`;
    document.getElementById('settings-modal').classList.add('open');
    return;
  }
  try {
    const c = await fetchContent(node.label, node.domain);
    node.content = c; node.visited = true;
    await DB.put(node);
    document.getElementById('panel-intuition').textContent = c.intuition;
    renderPanelContent(c, node);
    renderBubbles();
    if (!node.childrenGenerated) spawnChildren(node, c.subtopics);
  } catch(err) {
    document.getElementById('tab-concept').innerHTML =
      `<div style="padding:12px;color:#f87171;font-size:13px;line-height:1.7">
        生成失败：${err.message}<br>
        <small style="color:rgba(255,255,255,.28)">请检查 API Key 或稍后重试</small>
      </div>`;
  }
}

function renderPanelContent(c, node) {
  const md = s => `<div class="md">${marked.parse(s||'')}</div>`;
  const codeRaw = (c.code||'').replace(/\\n/g,'\n');

  document.getElementById('tab-concept').innerHTML =
    md(c.problem)+
    `<div style="margin-top:18px">
       <div class="sec">延伸话题</div>
       <div class="chips">${(c.subtopics||[]).map(s=>
         `<span class="chip" data-label="${s}" data-parent="${node.id}" data-domain="${node.domain}">${s}</span>`
       ).join('')}</div>
     </div>`;

  document.getElementById('tab-mechanism').innerHTML = md(c.mechanism);
  document.getElementById('tab-code').innerHTML =
    `<div class="md">${marked.parse('```python\n'+codeRaw+'\n```')}</div>`;
  document.getElementById('tab-papers').innerHTML = (c.papers||[]).length
    ? (c.papers||[]).map(p=>`
        <div class="paper-card">
          <div class="paper-title">${p.title||''}</div>
          <div class="paper-meta">${p.authors||''} · ${p.year||''}</div>
          ${p.url?`<a class="paper-link" href="${p.url}" target="_blank" rel="noopener">→ 查看原文</a>`:''}
        </div>`).join('')
    : `<div style="color:rgba(255,255,255,.22);font-size:13px">暂无论文信息</div>`;

  document.querySelectorAll('#panel-body pre code').forEach(el => hljs.highlightElement(el));
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => addNode(chip.dataset.label, chip.dataset.parent, chip.dataset.domain, true));
  });
}

// ─── Spawn / add ─────────────────────────────────────────────────────────────
async function spawnChildren(parent, subtopics) {
  parent.childrenGenerated = true;
  await DB.put(parent);
  const n = Math.min((subtopics||[]).length, S.count);
  for (let i=0; i<n; i++) {
    const label = subtopics[i];
    if (nodes.find(nd => nd.label===label)) continue;
    const id = 'n'+Date.now()+Math.random().toString(36).slice(2,5);
    const nd = {id,label,domain:parent.domain,level:parent.level+1,parentId:parent.id,clicks:0,visited:false,childrenGenerated:false,content:null};
    nodes.push(nd);
    await DB.put(nd);
  }
  if (currentNodeId===parent.id) renderBubbles();
}

async function addNode(label, parentId=null, domain='gen', andOpen=false) {
  const ex = nodes.find(n => n.label===label);
  if (ex) { if(andOpen) onBubbleClick(ex); return; }
  const id = 'n'+Date.now()+Math.random().toString(36).slice(2,5);
  const parent = getNode(parentId);
  const nd = {id,label,domain:domain||parent?.domain||'gen',level:parent?parent.level+1:0,parentId:parentId||null,clicks:0,visited:false,childrenGenerated:false,content:null};
  nodes.push(nd);
  await DB.put(nd);
  renderBubbles();
  if (andOpen) onBubbleClick(nd);
}

// ─── Explore ─────────────────────────────────────────────────────────────────
async function exploreNode(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;
  const btn = document.getElementById('explore-btn');
  if (!node.childrenGenerated) {
    if (!S.key) { document.getElementById('settings-modal').classList.add('open'); return; }
    btn.innerHTML = '生成子话题中…'; btn.disabled = true;
    try {
      if (!node.content) {
        const c = await fetchContent(node.label, node.domain);
        node.content = c; node.visited = true;
        await DB.put(node);
        document.getElementById('panel-intuition').textContent = c.intuition;
        renderPanelContent(c, node);
      }
      await spawnChildren(node, node.content.subtopics);
    } catch(e) {
      toast('生成失败：'+e.message);
      btn.innerHTML = '深入探索，展开子话题 <span>→</span>'; btn.disabled = false;
      return;
    }
  }
  closePanel();
  breadcrumb.push({id:node.id, label:node.label});
  currentNodeId = node.id;
  renderBreadcrumb();
  renderBubbles();
  btn.innerHTML = '深入探索，展开子话题 <span>→</span>'; btn.disabled = false;
}

// ─── Events ──────────────────────────────────────────────────────────────────
async function onBubbleClick(node) {
  node.clicks = (node.clicks||0)+1;
  node.lastClicked = Date.now();
  node.visited = true;
  await DB.put(node);
  openPanel(node);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

function initUI() {
  // Panel
  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('arena').addEventListener('click', e => {
    if (e.target===document.getElementById('arena')) closePanel();
  });

  // Back button
  document.getElementById('back-btn').addEventListener('click', navigateBack);

  // Swipe right to go back
  let swipeX = 0;
  document.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeX;
    if (dx > 72 && currentNodeId !== null && !document.getElementById('panel').classList.contains('open')) {
      navigateBack();
    }
  }, {passive:true});

  // Explore
  document.getElementById('explore-btn').addEventListener('click', () => {
    if (activeBubbleId) exploreNode(activeBubbleId);
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    });
  });

  // Search
  document.getElementById('search-input').addEventListener('keydown', async e => {
    if (e.key==='Enter') {
      const v = e.target.value.trim();
      if (v) {
        await addNode(v, currentNodeId||null, getNode(currentNodeId)?.domain||'gen', true);
        e.target.value = '';
        toast(`已添加「${v}」`);
      }
    }
  });

  // Settings
  document.getElementById('settings-btn').addEventListener('click', () => {
    document.getElementById('api-key-input').value = S.key;
    document.getElementById('sub-count').value = S.count;
    document.getElementById('settings-modal').classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', () =>
    document.getElementById('settings-modal').classList.remove('open'));
  document.getElementById('modal-save').addEventListener('click', () => {
    S.key   = document.getElementById('api-key-input').value.trim();
    S.count = +document.getElementById('sub-count').value;
    document.getElementById('settings-modal').classList.remove('open');
    toast('设置已保存');
  });
  document.getElementById('settings-modal').addEventListener('click', e => {
    if (e.target===document.getElementById('settings-modal'))
      document.getElementById('settings-modal').classList.remove('open');
  });

  window.addEventListener('resize', renderBubbles);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  await DB.open();
  const saved = await DB.all();
  if (saved.length===0) {
    for (const s of SEEDS) {
      const n = {...s,clicks:0,visited:false,childrenGenerated:false,content:null};
      nodes.push(n); await DB.put(n);
    }
  } else { nodes = saved; }
  initUI();
  renderBreadcrumb();
  renderBubbles();
  if (!S.key) setTimeout(()=>document.getElementById('settings-modal').classList.add('open'),600);
}

boot();
</script>
