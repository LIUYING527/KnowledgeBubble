<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>知识气泡</title>
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="apple-touch-icon" href="./icon.svg">
  <meta name="theme-color" content="#7c3aed">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:linear-gradient(150deg,#ede8ff 0%,#e8e0ff 45%,#f2edff 100%);
      color:#1e1b4b;
    }

    body::before{
      content:'';position:fixed;inset:0;
      background-image:
        radial-gradient(1.5px 1.5px at 8%  18%,rgba(139,92,246,.22) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 88% 12%,rgba(139,92,246,.18) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 63% 82%,rgba(56,189,248,.16) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 58%,rgba(139,92,246,.13) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 55%,rgba(56,189,248,.2)  0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 12% 72%,rgba(139,92,246,.11) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 74% 38%,rgba(139,92,246,.17) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 28% 92%,rgba(56,189,248,.12) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 52% 8%, rgba(139,92,246,.15) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 81% 78%,rgba(139,92,246,.13) 0%,transparent 100%),
        radial-gradient(circle at 18% 42%,rgba(139,92,246,.06) 0%,transparent 52%),
        radial-gradient(circle at 82% 62%,rgba(56,189,248,.05) 0%,transparent 52%);
      pointer-events:none;z-index:0;
    }

    /* ── Topbar ── */
    #topbar{
      position:fixed;top:0;left:0;right:0;height:52px;
      background:rgba(255,255,255,.85);backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(139,92,246,.12);
      display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;
    }
    .logo{font-size:15px;font-weight:800;letter-spacing:-.2px;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0}
    #breadcrumb{flex:1;display:flex;align-items:center;gap:2px;overflow:hidden;font-size:12px;min-width:0}
    .crumb{color:rgba(30,27,75,.35);cursor:pointer;padding:3px 6px;border-radius:6px;white-space:nowrap;transition:all .15s;flex-shrink:0}
    .crumb:hover{color:rgba(30,27,75,.75);background:rgba(139,92,246,.08)}
    .crumb.active{color:#1e1b4b;cursor:default;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;font-weight:600}
    .crumb-sep{color:rgba(30,27,75,.2);flex-shrink:0;padding:0 1px}

    /* Search */
    #search-wrap{position:relative;flex-shrink:0}
    #search-input{
      width:148px;background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.14);
      border-radius:20px;padding:7px 13px;color:#1e1b4b;font-size:13px;outline:none;
      transition:border-color .2s,width .25s;display:block;
    }
    #search-input:focus{border-color:rgba(139,92,246,.45);width:185px}
    #search-input::placeholder{color:rgba(30,27,75,.3)}

    #search-dropdown{
      position:absolute;top:calc(100% + 6px);left:0;right:0;
      background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
      border:1px solid rgba(139,92,246,.14);border-radius:10px;
      overflow:hidden;z-index:300;display:none;min-width:220px;
      box-shadow:0 8px 28px rgba(139,92,246,.12);
    }
    #search-dropdown.open{display:block}
    .sdrop-item{
      padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;
      border-bottom:1px solid rgba(139,92,246,.06);transition:background .15s;
    }
    .sdrop-item:last-child{border-bottom:none}
    .sdrop-item:hover{background:rgba(139,92,246,.06)}
    .sdrop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .sdrop-label{font-size:13px;font-weight:600;color:#1e1b4b;flex:1}
    .sdrop-path{font-size:11px;color:rgba(30,27,75,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
    .sdrop-empty{padding:12px 14px;font-size:13px;color:rgba(30,27,75,.38);text-align:center}

    /* Topbar icon buttons */
    .icon-btn{
      width:32px;height:32px;flex-shrink:0;
      background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.14);
      border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:rgba(30,27,75,.45);font-size:14px;transition:all .2s;
    }
    .icon-btn:hover{color:#5b21b6;border-color:rgba(139,92,246,.32);background:rgba(139,92,246,.12)}
    .icon-btn.active{color:#d97706;border-color:rgba(217,119,6,.38);background:rgba(217,119,6,.08)}

    /* ── Arena ── */
    #arena{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1}

    /* ── Bubbles ── */
    .bubble{position:absolute;transform:translate(-50%,-50%);cursor:pointer}
    .bubble-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}

    .bubble-body{
      position:relative;border-radius:50%;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:14px;
      background:
        radial-gradient(ellipse 46% 28% at 36% 24%,rgba(255,255,255,.96) 0%,rgba(255,255,255,.4) 50%,transparent 100%),
        radial-gradient(circle at 50% 50%,rgba(250,247,255,.9) 0%,rgba(238,232,255,.95) 100%);
      border:1.5px solid rgba(139,92,246,.18);
      transition:transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .bubble-body::before{content:'';position:absolute;inset:0;border-radius:50%;transition:opacity .3s}
    .bubble.cv  .bubble-body::before{background:radial-gradient(circle at 50% 50%,transparent 38%,rgba(56,189,248,.16) 100%)}
    .bubble.llm .bubble-body::before{background:radial-gradient(circle at 50% 50%,transparent 38%,rgba(139,92,246,.18) 100%)}
    .bubble.gen .bubble-body::before{background:radial-gradient(circle at 50% 50%,transparent 38%,rgba(249,115,22,.15) 100%)}
    .bubble-body::after{content:'';position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:36%;height:7%;border-radius:50%;background:rgba(255,255,255,.55);filter:blur(3px)}

    @keyframes glow-cv {
      0%,100%{box-shadow:0 4px 22px rgba(56,189,248,.25),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
      50%{box-shadow:0 4px 36px rgba(56,189,248,.44),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
    }
    @keyframes glow-llm{
      0%,100%{box-shadow:0 4px 22px rgba(139,92,246,.28),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
      50%{box-shadow:0 4px 36px rgba(139,92,246,.5),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
    }
    @keyframes glow-gen{
      0%,100%{box-shadow:0 4px 22px rgba(249,115,22,.22),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
      50%{box-shadow:0 4px 36px rgba(249,115,22,.4),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
    }
    @keyframes glow-stale{
      0%,100%{box-shadow:0 4px 22px rgba(217,119,6,.28),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
      50%{box-shadow:0 4px 36px rgba(217,119,6,.5),0 2px 8px rgba(0,0,0,.05),inset 0 1.5px 0 rgba(255,255,255,.9)}
    }

    .bubble.cv   .bubble-body{animation:glow-cv   3.2s ease-in-out infinite}
    .bubble.llm  .bubble-body{animation:glow-llm  3.2s ease-in-out infinite}
    .bubble.gen  .bubble-body{animation:glow-gen  3.2s ease-in-out infinite}
    .bubble.stale .bubble-body{animation:glow-stale 2.4s ease-in-out infinite!important}

    .bubble:hover    .bubble-body{transform:scale(1.09)}
    .bubble.selected .bubble-body{transform:scale(1.12)}
    .bubble.selected.cv  .bubble-body{animation:none;box-shadow:0 0 44px rgba(56,189,248,.55),0 6px 20px rgba(0,0,0,.08),inset 0 1.5px 0 rgba(255,255,255,.95)}
    .bubble.selected.llm .bubble-body{animation:none;box-shadow:0 0 44px rgba(139,92,246,.6),0 6px 20px rgba(0,0,0,.08),inset 0 1.5px 0 rgba(255,255,255,.95)}
    .bubble.selected.gen .bubble-body{animation:none;box-shadow:0 0 44px rgba(249,115,22,.5),0 6px 20px rgba(0,0,0,.08),inset 0 1.5px 0 rgba(255,255,255,.95)}

    .bubble-label{position:relative;z-index:1;font-size:13px;font-weight:700;color:#2e1a6e;line-height:1.3;pointer-events:none}
    .bubble-dot{position:relative;z-index:1;width:5px;height:5px;border-radius:50%;margin-top:7px;background:rgba(30,27,75,.15);transition:background .3s}
    .bubble.visited .bubble-dot{background:rgba(22,163,74,.7);box-shadow:0 0 6px rgba(22,163,74,.4)}
    .bubble.stale   .bubble-dot{background:rgba(217,119,6,.85)!important;box-shadow:0 0 7px rgba(217,119,6,.45)!important}
    .bubble-arrow{position:relative;z-index:1;font-size:9px;color:rgba(30,27,75,.25);margin-top:3px;pointer-events:none;letter-spacing:-1px;transition:color .2s}
    .bubble:hover .bubble-arrow{color:rgba(30,27,75,.55)}

    .bubble-star{position:absolute;top:4px;right:4px;font-size:10px;z-index:3;pointer-events:none;filter:drop-shadow(0 0 3px rgba(217,119,6,.5))}

    /* Progress ring SVG */
    .pring{position:absolute;pointer-events:none;z-index:2}

    @keyframes f0{0%,100%{margin-top:0}50%{margin-top:-12px}}
    @keyframes f1{0%,100%{margin-top:-4px}50%{margin-top:10px}}
    @keyframes f2{0%,100%{margin-top:8px}50%{margin-top:-10px}}
    @keyframes f3{0%,100%{margin-top:-3px}50%{margin-top:13px}}
    @keyframes f4{0%,100%{margin-top:9px}50%{margin-top:-8px}}
    @keyframes f5{0%,100%{margin-top:-7px}50%{margin-top:9px}}
    @keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.22)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.5}
    .empty-icon{font-size:52px}
    .empty-text{font-size:14px;color:rgba(30,27,75,.5);text-align:center;max-width:220px;line-height:1.65}

    /* ── Back button ── */
    #back-btn{
      position:fixed;bottom:26px;left:50%;
      transform:translateX(-50%) translateY(90px);
      background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
      border:1px solid rgba(139,92,246,.18);border-radius:26px;
      color:#5b21b6;padding:10px 22px;font-size:13px;font-weight:600;
      cursor:pointer;z-index:60;display:flex;align-items:center;gap:8px;
      box-shadow:0 4px 18px rgba(139,92,246,.16);
      transition:transform .36s cubic-bezier(.34,1.2,.64,1),box-shadow .2s;white-space:nowrap;
    }
    #back-btn.visible{transform:translateX(-50%) translateY(0)}
    #back-btn:hover{box-shadow:0 6px 24px rgba(139,92,246,.28)}

    /* ── Side Panel ── */
    #panel{
      position:fixed;top:52px;right:0;bottom:0;width:390px;
      background:rgba(254,252,255,.97);backdrop-filter:blur(22px);
      border-left:1px solid rgba(139,92,246,.1);
      transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
      z-index:50;display:flex;flex-direction:column;overflow:hidden;
      box-shadow:-6px 0 28px rgba(139,92,246,.08);
    }
    #panel.open{transform:translateX(0)}
    #panel-header{padding:18px 16px 0;position:relative;flex-shrink:0}
    #panel-close{position:absolute;top:14px;right:44px;width:28px;height:28px;background:rgba(139,92,246,.07);border:none;border-radius:50%;cursor:pointer;color:rgba(30,27,75,.38);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    #panel-close:hover{color:#1e1b4b;background:rgba(139,92,246,.14)}
    #panel-star{position:absolute;top:14px;right:12px;width:28px;height:28px;background:rgba(139,92,246,.07);border:none;border-radius:50%;cursor:pointer;color:rgba(30,27,75,.38);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    #panel-star:hover{background:rgba(139,92,246,.14)}
    #panel-star.starred{color:#d97706;background:rgba(217,119,6,.1)}
    #panel-title{font-size:21px;font-weight:800;margin-bottom:4px;padding-right:70px;line-height:1.2;color:#1e1b4b}
    #panel-intuition{font-size:13px;color:rgba(30,27,75,.45);margin-bottom:12px;line-height:1.55}
    #explore-btn{margin:0 16px 14px;flex-shrink:0;background:linear-gradient(135deg,rgba(56,189,248,.07),rgba(139,92,246,.1));border:1px solid rgba(139,92,246,.22);color:#6d28d9;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
    #explore-btn:hover{background:linear-gradient(135deg,rgba(56,189,248,.14),rgba(139,92,246,.2));color:#4c1d95;border-color:rgba(139,92,246,.42)}
    #explore-btn:disabled{opacity:.4;cursor:not-allowed}

    .tabs{display:flex;border-bottom:1px solid rgba(139,92,246,.1);padding:0 16px;flex-shrink:0;gap:2px}
    .tab{padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(30,27,75,.32);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
    .tab:hover{color:rgba(30,27,75,.65)}
    .tab.active{color:#1e1b4b;border-bottom-color:#a855f7}

    #panel-body{flex:1;overflow-y:auto;padding:16px}
    #panel-body::-webkit-scrollbar{width:3px}
    #panel-body::-webkit-scrollbar-thumb{background:rgba(139,92,246,.14);border-radius:2px}
    .tab-pane{display:none}
    .tab-pane.active{display:block}

    .md p{font-size:13px;line-height:1.78;color:rgba(30,27,75,.72);margin-bottom:10px}
    .md ul,.md ol{font-size:13px;line-height:1.72;color:rgba(30,27,75,.72);padding-left:18px;margin-bottom:10px}
    .md li{margin-bottom:3px}
    .md strong{color:#1e1b4b}
    .md h1,.md h2,.md h3{color:#1e1b4b;font-size:14px;margin:14px 0 6px}
    .md code{background:rgba(139,92,246,.09);padding:1px 5px;border-radius:4px;font-size:12px;color:#5b21b6;font-family:'JetBrains Mono',monospace}
    .md pre{background:#f8f5ff;border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;border:1px solid rgba(139,92,246,.1)}
    .md pre code{background:transparent;padding:0;font-size:12px;line-height:1.65;color:inherit}
    .md blockquote{border-left:3px solid #a855f7;padding-left:12px;color:rgba(30,27,75,.5);font-style:italic;margin:10px 0}
    .md a{color:#7c3aed;text-decoration:none}
    .md a:hover{text-decoration:underline}

    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:14px}
    .spinner{width:34px;height:34px;border:3px solid rgba(139,92,246,.12);border-top-color:#a855f7;border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p{color:rgba(30,27,75,.35);font-size:13px}

    .paper-card{background:rgba(139,92,246,.04);border:1px solid rgba(139,92,246,.1);border-radius:10px;padding:13px;margin-bottom:10px}
    .paper-title{font-size:13px;font-weight:700;color:#6d28d9;margin-bottom:3px}
    .paper-meta{font-size:12px;color:rgba(30,27,75,.38);margin-bottom:8px}
    .paper-link{font-size:12px;color:#0369a1;text-decoration:none}
    .paper-link:hover{text-decoration:underline}

    .sec{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(30,27,75,.28);margin-bottom:10px;margin-top:18px}
    .sec:first-child{margin-top:0}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.16);color:#6d28d9;padding:5px 11px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .18s}
    .chip:hover{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.36);color:#4c1d95}

    .rec-card{background:rgba(139,92,246,.04);border:1px solid rgba(139,92,246,.08);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .18s}
    .rec-card:hover{background:rgba(139,92,246,.1)}
    .rec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .rec-label{font-size:13px;font-weight:600;color:#1e1b4b;flex:1}
    .rec-domain{font-size:11px;color:rgba(30,27,75,.35)}

    .stale-banner{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.22);border-radius:8px;padding:9px 12px;margin-bottom:14px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:8px}

    /* Settings */
    #settings-modal{position:fixed;inset:0;background:rgba(91,33,182,.18);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
    #settings-modal.open{display:flex}
    .modal-box{background:#fff;border:1px solid rgba(139,92,246,.12);border-radius:16px;padding:24px;width:350px;max-width:calc(100vw - 32px);box-shadow:0 16px 48px rgba(139,92,246,.16)}
    .modal-title{font-size:17px;font-weight:800;margin-bottom:18px;color:#1e1b4b}
    .form-label{font-size:11px;font-weight:700;color:rgba(30,27,75,.38);margin-bottom:5px;display:block;letter-spacing:.06em;text-transform:uppercase}
    .form-input{width:100%;background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.12);border-radius:8px;padding:9px 12px;color:#1e1b4b;font-size:13px;outline:none;margin-bottom:14px;font-family:monospace;transition:border-color .2s}
    .form-input:focus{border-color:rgba(139,92,246,.48)}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}
    .btn-p{background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;color:white;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:0 2px 12px rgba(139,92,246,.3)}
    .btn-s{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.14);color:rgba(30,27,75,.65);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px}

    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(255,255,255,.97);border:1px solid rgba(139,92,246,.14);border-radius:10px;padding:9px 18px;font-size:13px;color:#1e1b4b;z-index:300;transition:transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(139,92,246,.14)}
    #toast.show{transform:translateX(-50%) translateY(0)}

    @media(max-width:600px){
      #panel{width:100%;border-left:none;border-top:1px solid rgba(139,92,246,.1)}
      #search-input{width:100px}
      #search-input:focus{width:130px}
    }

    /* ── Auth ── */
    #auth-btn{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.16);color:rgba(30,27,75,.55);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
    #auth-btn:hover{background:rgba(139,92,246,.16)}
    #auth-btn.logged-in{background:rgba(139,92,246,.18);color:#7c3aed}
    #auth-modal{position:fixed;inset:0;background:rgba(91,33,182,.18);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
    #auth-modal.open{display:flex}
    .auth-tabs{display:flex;border:1px solid rgba(139,92,246,.14);border-radius:8px;overflow:hidden;margin-bottom:14px}
    .auth-tabs button{flex:1;border:none;padding:8px;font-size:13px;cursor:pointer;background:rgba(139,92,246,.04);color:rgba(30,27,75,.45)}
    .auth-tabs button.active{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white}
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo">知识气泡</div>
  <nav id="breadcrumb"></nav>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="搜索 / 添加…" autocomplete="off">

<script>
'use strict';

// ── Supabase Auth & Sync ─────────────────────────────────────────────────
const sb = supabase.createClient(

const SEEDS = [
  {id:'cv',           label:'计算机视觉',  domain:'cv',  level:0, parentId:null},
  {id:'llm',          label:'大语言模型',  domain:'llm', level:0, parentId:null},

  {id:'rlhf',         label:'RLHF',        domain:'llm', level:1, parentId:'llm'},
  {id:'agent',        label:'Agent',       domain:'llm', level:1, parentId:'llm'},
  {id:'rag',          label:'RAG',         domain:'llm', level:1, parentId:'llm'},
];

// 包装 DB.put，每次写入后触发云同步
const _dbPut = DB.put.bind(DB);
DB.put = async (item) => { const r = await _dbPut(item); scheduleSave(); return r; };

const DCOL = {cv:'#0ea5e9', llm:'#8b5cf6', gen:'#f97316'};
const DNAME = {cv:'计算机视觉', llm:'大语言模型', gen:'其他'};
const STALE_MS = 7 * 86400000;
// Stable DB name — never change this, or all user data will be lost on update
const DB_NAME = 'KnowledgeBubble';

const S = {
  get key()    { return localStorage.getItem('ds_key') || ''; },
  set key(v)   { localStorage.setItem('ds_key', v); },
  get count()  { return +(localStorage.getItem('sub_n') || 5); },
  set count(v) { localStorage.setItem('sub_n', v); },
};

// ─── DB ──────────────────────────────────────────────────────────────────────
const DB = (() => {
  let _db;
  const open = () => new Promise((ok,fail) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('nodes')) d.createObjectStore('nodes',{keyPath:'id'});
    };
    r.onsuccess = e => { _db = e.target.result; ok(); };
    r.onerror = fail;
  });
  const st = m => _db.transaction('nodes',m).objectStore('nodes');
  const all = () => new Promise((ok,fail) => { const r=st('readonly').getAll(); r.onsuccess=()=>ok(r.result); r.onerror=fail; });
  const put = item => new Promise((ok,fail) => { const r=st('readwrite').put(item); r.onsuccess=ok; r.onerror=fail; });
  return {open,all,put};
})();

// ─── Migrate from old DB names ────────────────────────────────────────────────
async function migrateFromOldDB() {
  const OLD = ['KB5','KB4','KB3','KB2','KB1','KB'];
  for (const name of OLD) {
    try {
      const items = await new Promise((ok) => {
        const r = indexedDB.open(name, 1);
        r.onerror = () => ok(null);
        r.onupgradeneeded = e => { e.target.result.close(); ok(null); };
        r.onsuccess = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('nodes')) { db.close(); ok(null); return; }
          const req = db.transaction('nodes','readonly').objectStore('nodes').getAll();
          req.onsuccess = () => { db.close(); ok(req.result); };
          req.onerror  = () => { db.close(); ok(null); };
        };
      });
      if (items && items.length > 0) return items;
    } catch(e) {}
  }
  return null;
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function fetchContent(label, domain) {
  const ctx = DNAME[domain] || '人工智能';
  const prompt =
`你是${ctx}领域技术知识助手。为"${label}"生成学习卡片。
返回合法 JSON，字段值中换行用 \\n，不要输出 JSON 以外的任何内容：
{
  "intuition": "核心直觉，20字以内",
  "problem": "解决了什么问题，Markdown格式，100字左右",
  "mechanism": "工作原理，Markdown格式含公式（用反引号），200字左右",
  "code": "最小Python示例，约12行有注释，每行间用 \\\\n 分隔，不加代码围栏",
  "papers": [{"title":"论文名","authors":"作者 et al.","year":2017,"url":"https://arxiv.org/abs/xxxx.xxxxx"}],
  "subtopics": ["具体子概念1","具体子概念2","具体子概念3","具体子概念4","具体子概念5"]
}`;

  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method:'POST',
    headers:{'Authorization':`Bearer ${S.key}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],temperature:0.7,max_tokens:3000}),
  });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  let raw = (await resp.json()).choices[0].message.content.trim();
  if (raw.startsWith('```')) raw = raw.replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'');
  const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
  if (s>=0 && e>s) raw = raw.slice(s,e+1);
  return JSON.parse(raw);
}

// ─── State ───────────────────────────────────────────────────────────────────
let nodes = [];
let currentNodeId = null;
let breadcrumb = [];
let activeBubbleId = null;
let viewMode = 'normal';

const getNode = id => nodes.find(n => n.id === id);
const getChildren = pid => nodes.filter(n => n.parentId === pid);
const isStale = n => n.visited && n.lastClicked && (Date.now()-n.lastClicked) > STALE_MS;

// ─── Layouts ─────────────────────────────────────────────────────────────────
const LAYOUTS = [
  [],[[50,50]],[[30,50],[70,50]],
  [[50,27],[24,65],[76,65]],
  [[28,30],[72,30],[22,68],[78,68]],
  [[50,20],[80,42],[70,76],[30,76],[20,42]],
  [[50,17],[78,30],[86,58],[66,82],[34,82],[14,58],[22,30]],
  [[50,14],[74,24],[89,48],[80,74],[57,88],[33,88],[11,74],[26,24]],
  [[50,13],[72,20],[89,38],[90,60],[74,80],[52,89],[30,80],[11,60],[11,38]],
];
function getLayout(n) {
  if (n<=0) return [];
  if (n<LAYOUTS.length) return LAYOUTS[n];
  return Array.from({length:n},(_,i)=>{const c=4,row=Math.floor(i/c),col=i%c,rows=Math.ceil(n/c);return[14+col*24,22+row*(54/Math.max(rows-1,1))];});
}

// ─── Progress ring ───────────────────────────────────────────────────────────
function progressRing(node, sz) {
  const kids = getChildren(node.id);
  if (!kids.length && !node.childrenGenerated) return '';
  const pct = kids.length ? kids.filter(k=>k.visited).length / kids.length : 0;
  const pad = 9, full = sz + pad*2;
  const cx = full/2, cy = full/2, r = sz/2 + 4;
  const circ = 2*Math.PI*r;
  const fill = pct * circ;
  const col = DCOL[node.domain] || '#8b5cf6';
  return `<svg class="pring" style="top:${-pad}px;left:${-pad}px;width:${full}px;height:${full}px" viewBox="0 0 ${full} ${full}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(139,92,246,.12)" stroke-width="2.5"/>
    ${fill>0.5?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="2.5"
      stroke-dasharray="${fill.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" opacity="0.65"/>`:''}
  </svg>`;
}

// ─── Recommendations ─────────────────────────────────────────────────────────
function getRecommendations(current) {
  const visited = nodes.filter(n=>n.visited && n.id!==current.id);
  if (visited.length < 2) return [];
  return nodes
    .filter(n => !n.visited && n.id!==current.id && n.level>0 && n.parentId)
    .map(n => ({n, score:(n.domain===current.domain?3:1) - Math.abs(n.level-current.level)*0.4}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3).map(x=>x.n);
}

// ─── Render bubbles ───────────────────────────────────────────────────────────
const FLOATS = ['f0','f1','f2','f3','f4','f5'];

function renderBubbles() {
  const arena = document.getElementById('arena');
  const backBtn = document.getElementById('back-btn');

  let children;
  if (viewMode === 'bookmarks') {
    children = nodes.filter(n => n.starred);
    backBtn.classList.remove('visible');
  } else {
    children = getChildren(currentNodeId);
    backBtn.classList.toggle('visible', currentNodeId !== null);
  }

  if (children.length === 0) {
    arena.innerHTML = `<div class="empty">
      <div class="empty-icon">${viewMode==='bookmarks'?'⭐':'🌱'}</div>
      <div class="empty-text">${viewMode==='bookmarks'?'还没有收藏的概念<br>点击面板右上角 ☆ 收藏':'点击气泡打开面板，<br>再点「深入探索」进入下一层'}</div>
    </div>`;
    return;
  }

  arena.innerHTML = '';
  const positions = getLayout(children.length);
  const vw = window.innerWidth, vh = window.innerHeight-52;

  children.forEach((node, i) => {
    const [cx,cy] = positions[i]||[50,50];
    const maxSz = Math.min(vw,vh)*0.27;
    const sz = Math.min(node.level===0?160:node.level===1?122:98, maxSz);
    const kf = FLOATS[i%FLOATS.length];
    const dur = 4.5+(i%4)*0.65, del = (i*0.48)%2.8, popDel = i*0.06;
    const hasKids = node.childrenGenerated || getChildren(node.id).length>0;
    const stale = isStale(node);

    const cls = ['bubble',node.domain,
      node.visited?'visited':'',
      stale?'stale':'',
      activeBubbleId===node.id?'selected':''
    ].filter(Boolean).join(' ');

    const div = document.createElement('div');
    div.className = cls;
    div.dataset.id = node.id;
    div.style.cssText = `left:${cx}%;top:${cy}%;
      animation:popIn .48s cubic-bezier(.175,.885,.32,1.275) ${popDel}s backwards,
                ${kf} ${dur}s ease-in-out ${del}s infinite;`;

    div.innerHTML = `<div class="bubble-wrap">
      ${progressRing(node, sz)}
      <div class="bubble-body" style="width:${sz}px;height:${sz}px">
        <div class="bubble-label">${node.label}</div>
        <div class="bubble-dot"></div>
        ${hasKids?'<div class="bubble-arrow">▾ ▾</div>':''}
      </div>
      ${node.starred?'<div class="bubble-star">⭐</div>':''}
    </div>`;

    div.addEventListener('click', ()=>onBubbleClick(node));
    arena.appendChild(div);
  });
}

function renderBreadcrumb() {
  const nav = document.getElementById('breadcrumb');
  if (viewMode==='bookmarks') {
    nav.innerHTML = '<span class="crumb active">⭐ 收藏</span>';
    return;
  }
  const crumbs = [{id:null,label:'首页'}, ...breadcrumb];
  nav.innerHTML = crumbs.map((c,i)=>{
    const last = i===crumbs.length-1;
    return (i>0?'<span class="crumb-sep">›</span>':'')+
      `<span class="crumb${last?' active':''}" data-idx="${i}">${c.label}</span>`;
  }).join('');
  nav.querySelectorAll('.crumb:not(.active)').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=+el.dataset.idx;
      breadcrumb = idx===0?[]:breadcrumb.slice(0,idx);
      currentNodeId = idx===0?null:breadcrumb[breadcrumb.length-1].id;
      activeBubbleId=null; closePanel(); renderBreadcrumb(); renderBubbles();
    });
  });
}

function navigateBack() {
  if (currentNodeId===null) return;
  breadcrumb.pop();
  currentNodeId = breadcrumb.length>0?breadcrumb[breadcrumb.length-1].id:null;
  activeBubbleId=null; closePanel(); renderBreadcrumb(); renderBubbles();
}

function setLoading() {
  const h=`<div class="loading"><div class="spinner"></div><p>AI 生成中…</p></div>`;
  ['concept','mechanism','code','papers'].forEach(t=>{ document.getElementById('tab-'+t).innerHTML=h; });
}

async function loadContent(node) {
  if (!S.key) {
    document.getElementById('tab-concept').innerHTML=`<div style="padding:12px;color:rgba(30,27,75,.45);font-size:13px;line-height:1.7">请先点右上角 ⚙ 填入 DeepSeek API Key</div>`;
    document.getElementById('settings-modal').classList.add('open');
    return;
  }
  try {
    const c = await fetchContent(node.label, node.domain);
    node.content=c; node.visited=true; node.lastClicked=Date.now();
    await DB.put(node);
    document.getElementById('panel-intuition').textContent=c.intuition;
    renderPanelContent(c,node); renderBubbles();
    if (!node.childrenGenerated) spawnChildren(node, c.subtopics);
  } catch(err) {
    document.getElementById('tab-concept').innerHTML=
      `<div style="padding:12px;color:#b91c1c;font-size:13px;line-height:1.7">生成失败：${err.message}<br><small style="color:rgba(30,27,75,.38)">请检查 API Key 或稍后重试</small></div>`;
  }
}

function renderPanelContent(c, node) {
  const md = s => `<div class="md">${marked.parse(s||'')}</div>`;
  const codeRaw = (c.code||'').replace(/\\n/g,'\n');
  const stale = isStale(node);
  const recs = getRecommendations(node);

  let conceptHtml = '';
  if (stale) conceptHtml += `<div class="stale-banner">⏰ 距上次学习已超过7天，建议复习</div>`;
  conceptHtml += md(c.problem);
  conceptHtml += `<div class="sec">延伸话题</div><div class="chips">${(c.subtopics||[]).map(s=>
    `<span class="chip" data-label="${s}" data-parent="${node.id}" data-domain="${node.domain}">${s}</span>`
  ).join('')}</div>`;
  if (recs.length) {
    conceptHtml += `<div class="sec">推荐探索</div>`;
    recs.forEach(r => {
      conceptHtml += `<div class="rec-card" data-id="${r.id}">
        <div class="rec-dot" style="background:${DCOL[r.domain]||'#8b5cf6'}"></div>
        <div class="rec-label">${r.label}</div>
        <div class="rec-domain">${DNAME[r.domain]||''}</div>
      </div>`;
    });
  }
  document.getElementById('tab-concept').innerHTML = conceptHtml;
  document.getElementById('tab-mechanism').innerHTML = md(c.mechanism);
  document.getElementById('tab-code').innerHTML = `<div class="md">${marked.parse('```python\n'+codeRaw+'\n```')}</div>`;
  document.getElementById('tab-papers').innerHTML = (c.papers||[]).length
    ? (c.papers||[]).map(p=>`<div class="paper-card"><div class="paper-title">${p.title||''}</div><div class="paper-meta">${p.authors||''} · ${p.year||''}</div>${p.url?`<a class="paper-link" href="${p.url}" target="_blank" rel="noopener">→ 查看原文</a>`:''}</div>`).join('')
    : `<div style="color:rgba(30,27,75,.28);font-size:13px">暂无论文信息</div>`;

  document.querySelectorAll('#panel-body pre code').forEach(el=>hljs.highlightElement(el));
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',()=>addNode(chip.dataset.label,chip.dataset.parent,chip.dataset.domain,true));
  });
  document.querySelectorAll('.rec-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const n=getNode(card.dataset.id);
      if(n) onBubbleClick(n);
    });
  });
}

// ─── Spawn / add ─────────────────────────────────────────────────────────────
async function spawnChildren(parent, subtopics) {
  parent.childrenGenerated=true; await DB.put(parent);
  const n=Math.min((subtopics||[]).length,S.count);
  for(let i=0;i<n;i++){
    const label=subtopics[i];
    if(nodes.find(nd=>nd.label===label)) continue;
    const id='n'+Date.now()+Math.random().toString(36).slice(2,5);
    const nd={id,label,domain:parent.domain,level:parent.level+1,parentId:parent.id,clicks:0,visited:false,childrenGenerated:false,content:null,starred:false};
    nodes.push(nd); await DB.put(nd);
  }
  if(currentNodeId===parent.id) renderBubbles();
}

async function addNode(label,parentId=null,domain='gen',andOpen=false){
  const ex=nodes.find(n=>n.label===label);
  if(ex){if(andOpen)onBubbleClick(ex);return;}
  const id='n'+Date.now()+Math.random().toString(36).slice(2,5);
  const parent=getNode(parentId);
  const nd={id,label,domain:domain||parent?.domain||'gen',level:parent?parent.level+1:0,parentId:parentId||null,clicks:0,visited:false,childrenGenerated:false,content:null,starred:false};
  nodes.push(nd); await DB.put(nd); renderBubbles();
  if(andOpen)onBubbleClick(nd);
}

// ─── Explore ─────────────────────────────────────────────────────────────────
async function exploreNode(nodeId){
  const node=getNode(nodeId); if(!node) return;
  const btn=document.getElementById('explore-btn');
  if(!node.childrenGenerated){
    if(!S.key){document.getElementById('settings-modal').classList.add('open');return;}
    btn.innerHTML='生成子话题中…'; btn.disabled=true;
    try{
      if(!node.content){
        const c=await fetchContent(node.label,node.domain);
        node.content=c; node.visited=true; node.lastClicked=Date.now();
        await DB.put(node);
        document.getElementById('panel-intuition').textContent=c.intuition;
        renderPanelContent(c,node);
      }
      await spawnChildren(node,node.content.subtopics);
    }catch(e){toast('生成失败：'+e.message);btn.innerHTML='深入探索，展开子话题 <span>→</span>';btn.disabled=false;return;}
  }
  closePanel();
  breadcrumb.push({id:node.id,label:node.label});
  currentNodeId=node.id;
  renderBreadcrumb(); renderBubbles();
  btn.innerHTML='深入探索，展开子话题 <span>→</span>'; btn.disabled=false;
}

// ─── Bubble click ─────────────────────────────────────────────────────────────
async function onBubbleClick(node){
  node.clicks=(node.clicks||0)+1;
  node.lastClicked=Date.now();
  node.visited=true;
  await DB.put(node);
  openPanel(node);
}

// ─── Search ───────────────────────────────────────────────────────────────────
function renderSearchDropdown(q) {
  const dd = document.getElementById('search-dropdown');
  if (!q) { dd.classList.remove('open'); return; }
  const matches = nodes.filter(n => n.label.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if (!matches.length) {
    dd.innerHTML = `<div class="sdrop-empty">按 Enter 添加「${q}」</div>`;
  } else {
    dd.innerHTML = matches.map(n => {
      const path = n.parentId ? (getNode(n.parentId)?.label||'') : '';
      return `<div class="sdrop-item" data-id="${n.id}">
        <div class="sdrop-dot" style="background:${DCOL[n.domain]||'#8b5cf6'}"></div>
        <div class="sdrop-label">${n.label}</div>
        ${path?`<div class="sdrop-path">${path}</div>`:''}
      </div>`;
    }).join('');
    dd.querySelectorAll('.sdrop-item').forEach(el=>{
      el.addEventListener('click',()=>{
        const n=getNode(el.dataset.id);
        if(n){onBubbleClick(n); dd.classList.remove('open'); document.getElementById('search-input').value='';}
      });
    });
  }
  dd.classList.add('open');
}

// ─── Star / bookmark ──────────────────────────────────────────────────────────
async function toggleStar(nodeId){
  const node=getNode(nodeId); if(!node) return;
  node.starred=!node.starred;
  await DB.put(node);
  const btn=document.getElementById('panel-star');
  btn.textContent=node.starred?'★':'☆';
  btn.classList.toggle('starred',node.starred);
  toast(node.starred?`已收藏「${node.label}」`:`已取消收藏`);
  renderBubbles();
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ─── UI wiring ────────────────────────────────────────────────────────────────
function initUI(){
  document.getElementById('panel-close').addEventListener('click',closePanel);
  document.getElementById('panel-star').addEventListener('click',()=>{if(activeBubbleId)toggleStar(activeBubbleId);});
  document.getElementById('arena').addEventListener('click',e=>{if(e.target===document.getElementById('arena'))closePanel();});
  document.getElementById('back-btn').addEventListener('click',navigateBack);
  document.getElementById('explore-btn').addEventListener('click',()=>{if(activeBubbleId)exploreNode(activeBubbleId);});

  document.getElementById('bookmark-btn').addEventListener('click',()=>{
    viewMode = viewMode==='bookmarks'?'normal':'bookmarks';
    document.getElementById('bookmark-btn').classList.toggle('active',viewMode==='bookmarks');
    activeBubbleId=null; closePanel(); renderBreadcrumb(); renderBubbles();
  });

  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    });
  });

  const si = document.getElementById('search-input');
  si.addEventListener('input', e => renderSearchDropdown(e.target.value.trim()));
  si.addEventListener('keydown', async e => {
    if (e.key==='Escape') { document.getElementById('search-dropdown').classList.remove('open'); si.value=''; return; }
    if (e.key==='Enter') {
      const v=si.value.trim();
      if(v){ await addNode(v,currentNodeId||null,getNode(currentNodeId)?.domain||'gen',true); si.value=''; document.getElementById('search-dropdown').classList.remove('open'); toast(`已添加「${v}」`); }
    }
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target))
      document.getElementById('search-dropdown').classList.remove('open');
  });

  document.getElementById('settings-btn').addEventListener('click',()=>{
    document.getElementById('api-key-input').value=S.key;
    document.getElementById('sub-count').value=S.count;
    document.getElementById('settings-modal').classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('settings-modal').classList.remove('open'));
  document.getElementById('modal-save').addEventListener('click',()=>{
    S.key=document.getElementById('api-key-input').value.trim();
    S.count=+document.getElementById('sub-count').value;
    document.getElementById('settings-modal').classList.remove('open');
    toast('设置已保存');
  });
  document.getElementById('settings-modal').addEventListener('click',e=>{
    if(e.target===document.getElementById('settings-modal'))document.getElementById('settings-modal').classList.remove('open');
  });

  let swipeX=0;
  document.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-swipeX;
    if(dx>72&&currentNodeId!==null&&!document.getElementById('panel').classList.contains('open'))navigateBack();
  },{passive:true});

  window.addEventListener('resize',renderBubbles);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot(){
  await DB.open();
  const saved = await DB.all();
  if (saved.length === 0) {
    // Try to carry over data from a previous DB version
    const migrated = await migrateFromOldDB();
    if (migrated && migrated.length > 0) {
      for (const n of migrated) { nodes.push(n); await DB.put(n); }
      setTimeout(() => toast('已迁移历史数据 ✓'), 500);
    } else {
      for (const s of SEEDS) {
        const n={...s,clicks:0,visited:false,childrenGenerated:false,content:null,starred:false};
        nodes.push(n); await DB.put(n);
      }
    }
  } else {
    nodes = saved.map(n=>({starred:false,...n}));
  }
  initUI(); renderBreadcrumb(); renderBubbles();
  if (!S.key) setTimeout(()=>document.getElementById('settings-modal').classList.add('open'),600);
  initAuth();
  document.getElementById('auth-modal').addEventListener('click', function(e) {
    if (e.target === this) closeAuthModal();
  });
}

boot();
</script>
